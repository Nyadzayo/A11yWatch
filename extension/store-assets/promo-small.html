<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>A11yTrail small promo tile</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Hanken+Grotesk:wght@500;600&display=swap" />
<style>
  html, body { margin: 0; }
  .tile { width: 440px; height: 280px; box-sizing: border-box; overflow: hidden;
    display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 14px; padding: 28px;
    background: radial-gradient(420px 240px at 50% 0%, #fffdf8 0%, #f4ece0 70%, #efe6d6 100%);
    font-family: "Hanken Grotesk", system-ui, sans-serif; color: #1a1714; }
  .tile img { width: 64px; height: 64px; border-radius: 14px; box-shadow: 0 8px 22px rgba(26,23,20,0.22); }
  .wm { font-family: "Fraunces", Georgia, serif; font-weight: 600; font-size: 36px; letter-spacing: -0.015em; }
  .wm b { color: #b23a1e; font-weight: 600; }
  .tag { font-size: 15px; font-weight: 500; color: #5b544b; max-width: 26ch; line-height: 1.4; }
  .kw { font-size: 12.5px; font-weight: 600; color: #8f2e15; letter-spacing: 0.02em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="tile">
  <img src="../icons/icon128.png" alt="" />
  <div class="wm">A11y<b>Trail</b></div>
  <div class="tag">Free WCAG &amp; ADA accessibility checker for any page.</div>
  <div class="kw">Scan · Fix · Monitor</div>
</div>
</body>
</html>
