{% extends "base.html" %}
{% block content %}
<h1>Sign in</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" action="/login" class="inline" style="flex-direction:column; max-width:320px;">
  <input name="email" type="email" placeholder="Email" autocomplete="username" required />
  <input name="password" type="password" placeholder="Password" autocomplete="current-password" required />
  <label class="muted"><input type="checkbox" name="create_account" /> Create a new account</label>
  <button type="submit">Continue</button>
</form>
<p class="muted">Monitoring and on-demand accessibility checks for your sites.</p>
{% endblock %}
