<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A11yWatch</title>
    {% block head %}{% endblock %}
    <style>
      :root { --fg:#1a1a1a; --muted:#666; --accent:#1a56db; --border:#e5e7eb; --critical:#b91c1c; --serious:#c2410c; --moderate:#a16207; --minor:#4b5563; }
      * { box-sizing: border-box; }
      body { font: 14px/1.5 system-ui, sans-serif; color: var(--fg); margin: 0; background: #fafafa; }
      header { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; background:#fff; border-bottom:1px solid var(--border); }
      header .brand { font-weight:700; color:var(--fg); text-decoration:none; }
      header form { display:flex; gap:8px; align-items:center; color:var(--muted); }
      main { max-width: 820px; margin: 0 auto; padding: 20px; }
      h1 { font-size:20px; } h2 { font-size:16px; margin-top:24px; }
      a { color: var(--accent); }
      input { padding:8px; border:1px solid var(--border); border-radius:6px; font:inherit; }
      button { padding:8px 12px; border:0; border-radius:6px; background:var(--accent); color:#fff; font:inherit; font-weight:600; cursor:pointer; }
      header button { background:none; color:var(--accent); padding:4px; }
      table { width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
      th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--border); }
      th { color:var(--muted); font-weight:600; }
      form.inline { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0; }
      .error { color: var(--critical); }
      .muted { color: var(--muted); }
      section h3 { text-transform: capitalize; margin:14px 0 4px; }
      section ul { list-style:none; padding:0; margin:0; }
      section li { background:#fff; border:1px solid var(--border); border-left:3px solid var(--border); border-radius:0 6px 6px 0; padding:8px 10px; margin-bottom:6px; }
      code { font-size:12px; color:var(--muted); word-break:break-all; }
      .trend { display:inline-block; font-weight:600; padding:2px 8px; border-radius:12px; font-size:13px; }
      .trend.improved { background:#dcfce7; color:#15803d; }
      .trend.regressed { background:#fee2e2; color:var(--critical); }
      .trend.unchanged { background:#f3f4f6; color:var(--muted); }
      .bars { display:flex; align-items:flex-end; gap:4px; height:80px; padding:8px 0; }
      .bar { width:22px; min-height:3px; background:var(--accent); border-radius:3px 3px 0 0; }
      .sev { display:inline-block; min-width:16px; text-align:center; border-radius:4px; padding:1px 6px; color:#fff; font-size:12px; font-weight:600; }
      .sev.critical { background:var(--critical); }
      .sev.serious { background:var(--serious); }
      .sev.moderate { background:var(--moderate); }
      .sev.minor { background:var(--minor); }
      td.issue-count { font-weight:600; }
    </style>
  </head>
  <body>
    <header>
      <a href="/" class="brand">A11yWatch</a>
      {% if user %}
      <form method="post" action="/logout"><span class="muted">{{ user.email }}</span> <button type="submit">Log out</button></form>
      {% endif %}
    </header>
    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
