# Local infra for A11yWatch: Postgres + Redis.
# App, workers, and scheduler run on the host via uv during development.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: a11ywatch
      POSTGRES_PASSWORD: a11ywatch
      POSTGRES_DB: a11ywatch
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a11ywatch"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
